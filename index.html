<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Ventas — Grupo Tronchetto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; font-weight: 500; color: #1a1a1a; }
  header span { font-size: 13px; color: #888; }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  #login-screen h2 { font-size: 22px; font-weight: 500; margin-bottom: 12px; }
  #login-screen p { font-size: 14px; color: #666; margin-bottom: 32px; max-width: 380px; line-height: 1.6; }
  
  .btn-ms { display: inline-flex; align-items: center; gap: 10px; background: #0078d4; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-ms:hover { background: #006cbe; }
  .btn-ms svg { width: 20px; height: 20px; }

  #loading-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e5e5e5; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { font-size: 14px; color: #666; }

  #error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  #error-msg { font-size: 14px; color: #c0392b; margin-bottom: 16px; max-width: 420px; line-height: 1.6; }
  .btn-retry { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-retry:hover { background: #f0f0f0; }

  #report-screen { display: none; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .metric { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 16px 20px; }
  .metric label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
  .metric .val { font-size: 24px; font-weight: 500; }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
  .chart-card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 20px; }
  .chart-card h3 { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 240px; }

  .table-card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 20px; overflow-x: auto; }
  .table-card h3 { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e5e5; font-weight: 500; color: #555; white-space: nowrap; }
  tbody td { padding: 7px 12px; border-bottom: 0.5px solid #f0f0f0; white-space: nowrap; color: #333; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }

  .footer-note { font-size: 12px; color: #aaa; margin-top: 20px; text-align: center; }

  .user-bar { display: flex; align-items: center; gap: 8px; }
  .user-bar .avatar { width: 28px; height: 28px; border-radius: 50%; background: #0078d4; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
  .user-bar .name { font-size: 13px; color: #555; }
</style>
</head>
<body>

<header>
  <h1>Reporte Ventas — Grupo Tronchetto</h1>
  <div class="user-bar">
    <div class="avatar" id="avatar" style="display:none;"></div>
    <span class="name" id="user-name"></span>
  </div>
</header>

<div class="container">

  <div id="login-screen">
    <h2>Iniciá sesión</h2>
    <p>Conectate con tu cuenta de Tronchetto para cargar el archivo de evolución de ventas desde SharePoint.</p>
    <button class="btn-ms" onclick="doLogin()">
      <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Iniciar sesión con Microsoft
    </button>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-msg">Cargando...</p>
  </div>

  <div id="error-screen">
    <p id="error-msg"></p>
    <button class="btn-retry" onclick="showScreen('login-screen')">Volver a intentar</button>
  </div>

  <div id="report-screen">
    <div class="metrics" id="metric-cards"></div>
    <div class="charts">
      <div class="chart-card">
        <h3>Raciones por período</h3>
        <div class="chart-wrap"><canvas id="chart-raciones" role="img" aria-label="Raciones por período"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Monto Neto AR$ por período</h3>
        <div class="chart-wrap"><canvas id="chart-precio" role="img" aria-label="Monto Neto AR$ por período"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <h3 id="table-title">Datos</h3>
      <table id="data-table"></table>
    </div>
    <p class="footer-note" id="footer-note"></p>
  </div>

</div>

<script>
const CLIENT_ID = '48ad5a10-625f-492f-8564-60d612e5405f';
const TENANT = '3b704bc6-f92b-4581-a329-e1d4afa9987a';
const SCOPES = 'Files.Read.All Sites.Read.All User.Read';
const DRIVE_ID = 'b!pmFBZLuJVkeuGzPtHmyMtMnI1MPI-WtNtZQeYhwzMrCBd7CMfYuTQKSXTAwlNDU4';
const ITEM_ID = '01FRDE3KMK5RHCJV4F4FE3JD5SSAWLFEMT';
const REDIRECT = 'https://reporte-ventas-sc.vercel.app/';

let chartRaciones, chartPrecio;

// --- PKCE helpers ---
function b64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generatePKCE() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: b64url(digest) };
}

function showScreen(id) {
  ['login-screen','loading-screen','error-screen','report-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? (id === 'login-screen' || id === 'error-screen' ? 'flex' : 'block') : 'none';
  });
}

function setLoading(msg) {
  showScreen('loading-screen');
  document.getElementById('loading-msg').textContent = msg;
}

function setError(msg) {
  showScreen('error-screen');
  document.getElementById('error-msg').textContent = msg;
}

async function doLogin() {
  const { verifier, challenge } = await generatePKCE();
  const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT,
    scope: SCOPES,
    state,
    code_challenge: challenge,
    code_challenge_method: 'S256',
  });
  window.location.href = `https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) throw new Error('PKCE verifier no encontrado. Intentá iniciar sesión de nuevo.');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT,
    code_verifier: verifier,
  });
  const res = await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString(),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || `Error ${res.status} al obtener token`);
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('oauth_state');
  return data.access_token;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  if (error) {
    setError(`Error de autenticación: ${params.get('error_description') || error}`);
    return true;
  }
  if (!code) return false;
  if (state !== sessionStorage.getItem('oauth_state')) {
    setError('Error de seguridad: state inválido. Intentá de nuevo.');
    return true;
  }
  history.replaceState(null, '', window.location.pathname);
  setLoading('Autenticando...');
  const token = await exchangeCode(code);
  sessionStorage.setItem('ms_token', token);
  await loadFile(token);
  return true;
}

async function getUser(token) {
  const res = await fetch('https://graph.microsoft.com/v1.0/me', { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) return null;
  return res.json();
}

async function loadFile(token) {
  setLoading('Descargando archivo desde SharePoint...');
  try {
    const user = await getUser(token);
    if (user) {
      const initials = ((user.givenName?.[0] || '') + (user.surname?.[0] || '')).toUpperCase() || user.displayName?.[0]?.toUpperCase() || '?';
      document.getElementById('avatar').textContent = initials;
      document.getElementById('avatar').style.display = 'flex';
      document.getElementById('user-name').textContent = user.displayName || user.userPrincipalName;
    }

    const url = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${ITEM_ID}/content`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { showScreen('login-screen'); return; }
    if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);

    setLoading('Procesando hoja Base...');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('base')) || wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    const tipoCol = Object.keys(rows[0] || {}).find(c => /tipo\s*de\s*producto/i.test(c));
    const TIPOS = ['semielaborados', 'viandas vida util'];
    const filtered = tipoCol
      ? rows.filter(r => TIPOS.includes(String(r[tipoCol]).toLowerCase().trim()))
      : rows;
    renderReport(filtered);
  } catch(e) {
    setError('No se pudo cargar el archivo. ' + e.message);
  }
}

function fmtAR(v) {
  return '$' + Math.round(v).toLocaleString('es-AR');
}

function fmtUSD(v) {
  return 'U$S ' + Math.round(v).toLocaleString('es-AR');
}

function renderReport(rows) {
  if (!rows.length) { setError('Sin datos para mostrar con el filtro aplicado.'); return; }

  // Aggregate by Periodo fiscal (monthly)
  const periodMap = new Map();
  rows.forEach(r => {
    const d = r['Periodo fiscal'];
    let key, label;
    if (d instanceof Date) {
      key = d.toISOString().slice(0, 7);
      label = d.toLocaleDateString('es-AR', { month: 'short', year: '2-digit' });
    } else {
      key = String(d).slice(0, 7);
      label = key;
    }
    if (!periodMap.has(key)) periodMap.set(key, { label, raciones: 0, montoNeto: 0, netoUsd: 0 });
    const p = periodMap.get(key);
    p.raciones += Number(r['Raciones']) || 0;
    p.montoNeto += Number(r['Monto Neto']) || 0;
    p.netoUsd += Number(r['Neto u$s']) || 0;
  });

  const periods = [...periodMap.entries()]
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([, v]) => v);

  const totalRaciones = periods.reduce((a, p) => a + p.raciones, 0);
  const totalMontoNeto = periods.reduce((a, p) => a + p.montoNeto, 0);
  const totalNetoUsd = periods.reduce((a, p) => a + p.netoUsd, 0);
  const precioPromAr = totalRaciones ? totalMontoNeto / totalRaciones : 0;

  document.getElementById('metric-cards').innerHTML = [
    { label: 'Total raciones', val: Math.round(totalRaciones).toLocaleString('es-AR') },
    { label: 'Monto Neto AR$', val: fmtAR(totalMontoNeto) },
    { label: 'Neto U$S', val: fmtUSD(totalNetoUsd) },
    { label: 'AR$ / ración', val: fmtAR(precioPromAr) },
  ].map(m => `<div class="metric"><label>${m.label}</label><div class="val">${m.val}</div></div>`).join('');

  if (chartRaciones) chartRaciones.destroy();
  if (chartPrecio) chartPrecio.destroy();

  const chartLabels = periods.map(p => p.label);

  chartRaciones = new Chart(document.getElementById('chart-raciones'), {
    type: 'bar',
    data: {
      labels: chartLabels,
      datasets: [{ label: 'Raciones', data: periods.map(p => Math.round(p.raciones)), backgroundColor: '#0078d4', borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: true, maxRotation: 45, font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, callback: v => v.toLocaleString('es-AR') } }
      }
    }
  });

  chartPrecio = new Chart(document.getElementById('chart-precio'), {
    type: 'line',
    data: {
      labels: chartLabels,
      datasets: [{ label: 'Monto Neto AR$', data: periods.map(p => Math.round(p.montoNeto)), borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.08)', borderWidth: 2, pointRadius: 3, fill: true, tension: 0.3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: true, maxRotation: 45, font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, callback: v => fmtAR(v) } }
      }
    }
  });

  document.getElementById('table-title').textContent = 'Resumen mensual — Semielaborados + Viandas vida util';
  document.getElementById('data-table').innerHTML =
    `<thead><tr><th>Período</th><th>Raciones</th><th>Monto Neto AR$</th><th>Neto U$S</th><th>AR$ / ración</th></tr></thead>` +
    `<tbody>${periods.map(p => `<tr>
      <td>${p.label}</td>
      <td>${Math.round(p.raciones).toLocaleString('es-AR')}</td>
      <td>${fmtAR(p.montoNeto)}</td>
      <td>${fmtUSD(p.netoUsd)}</td>
      <td>${fmtAR(p.raciones ? p.montoNeto / p.raciones : 0)}</td>
    </tr>`).join('')}</tbody>`;

  document.getElementById('footer-note').textContent =
    `${rows.length.toLocaleString('es-AR')} registros · Semielaborados + Viandas vida util · Última actualización: ${new Date().toLocaleString('es-AR')}`;

  showScreen('report-screen');
}

(async () => {
  const handled = await handleCallback();
  if (!handled) {
    const stored = sessionStorage.getItem('ms_token');
    if (stored) {
      loadFile(stored);
    } else {
      showScreen('login-screen');
    }
  }
})();
</script>
</body>
</html>
