<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Ventas — Grupo Tronchetto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #111318; --surface: #1c1f26; --surface2: #252830; --border: #2e3240;
  --text: #e8eaf0; --text2: #8b90a0; --accent: #1db87a; --blue: #3b8ef0;
  --red: #e05252; --green: #1db87a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Auth */
#login-screen, #loading-screen, #error-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 24px;
}
#login-screen h2 { font-size: 22px; font-weight: 500; margin-bottom: 12px; }
#login-screen p { font-size: 14px; color: var(--text2); margin-bottom: 32px; max-width: 380px; line-height: 1.6; }
.btn-ms { display: inline-flex; align-items: center; gap: 10px; background: #0078d4; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
.btn-ms:hover { background: #006cbe; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { font-size: 14px; color: var(--text2); }
#error-msg { font-size: 14px; color: var(--red); margin-bottom: 16px; max-width: 420px; line-height: 1.6; }
.btn-retry { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text); }

/* Header */
.dash-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 13px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.dash-title { display: flex; align-items: center; gap: 10px; }
.dash-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.dash-title h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 12px; }
.toggle-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.toggle-btn { background: none; border: none; color: var(--text2); padding: 5px 13px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.toggle-btn.active { background: var(--accent); color: #fff; }
.user-chip { display: flex; align-items: center; gap: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.user-name { font-size: 13px; color: var(--text2); }

/* MEP bar */
.mep-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 9px 28px; display: flex; align-items: center; gap: 24px; overflow-x: auto; }
.mep-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.mep-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.mep-month { font-size: 12px; color: var(--text2); }
.mep-val { font-size: 13px; font-weight: 600; }

/* Body */
.dash-body { padding: 20px 28px; max-width: 1300px; margin: 0 auto; }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); margin-right: 4px; }
.year-btn { background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--text2); padding: 5px 12px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.year-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(29,184,122,0.08); }

/* KPIs */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
@media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .kpi-row { grid-template-columns: 1fr; } }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
.kpi-main { font-size: 26px; font-weight: 600; line-height: 1.1; }
.kpi-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.kpi-delta { font-size: 12px; margin-top: 6px; }
.delta-up { color: var(--green); }
.delta-down { color: var(--red); }

/* Charts */
.charts-row { display: grid; gap: 12px; margin-bottom: 12px; }
.charts-row.full { grid-template-columns: 1fr; }
.charts-row.half { grid-template-columns: 1fr 1fr; }
@media (max-width: 820px) { .charts-row.half { grid-template-columns: 1fr; } }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
.chart-card h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
.chart-wrap { position: relative; height: 220px; }
.chart-wrap.tall { height: 300px; }
</style>
</head>
<body>

<div id="login-screen">
  <h2>Iniciá sesión</h2>
  <p>Conectate con tu cuenta de Tronchetto para acceder al reporte de ventas Sous Chef.</p>
  <button class="btn-ms" onclick="doLogin()">
    <svg viewBox="0 0 21 21" fill="none" width="20" height="20"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
    Iniciar sesión con Microsoft
  </button>
</div>

<div id="loading-screen" style="display:none;">
  <div class="spinner"></div>
  <p id="loading-msg">Cargando...</p>
</div>

<div id="error-screen" style="display:none;">
  <p id="error-msg"></p>
  <button class="btn-retry" onclick="showScreen('login-screen')">Volver a intentar</button>
</div>

<div id="report-screen" style="display:none;">
  <header class="dash-header">
    <div class="dash-title">
      <div class="dash-dot"></div>
      <h1>Sous Chef — Ventas</h1>
    </div>
    <div class="header-right">
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-usd" onclick="setCurrency('usd')">U$S</button>
        <button class="toggle-btn" id="btn-ars" onclick="setCurrency('ars')">AR$</button>
      </div>
      <div class="user-chip">
        <div class="avatar" id="avatar" style="display:none;"></div>
        <span class="user-name" id="user-name"></span>
      </div>
    </div>
  </header>

  <div id="mep-bar" class="mep-bar"></div>

  <div class="dash-body">
    <div class="filter-bar">
      <span class="filter-label">Año</span>
      <div id="year-filters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <div class="kpi-row" id="kpi-row"></div>

    <div class="charts-row full">
      <div class="chart-card">
        <h3 id="title-facturacion">Facturación mensual U$S — Sous Chef</h3>
        <div class="chart-wrap"><canvas id="chart-facturacion"></canvas></div>
      </div>
    </div>

    <div class="charts-row half">
      <div class="chart-card">
        <h3>SC vs Social Lunch — Facturación U$S</h3>
        <div class="chart-wrap"><canvas id="chart-vs-sl"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Top productos — Raciones (acumulado período)</h3>
        <div class="chart-wrap tall"><canvas id="chart-productos"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '48ad5a10-625f-492f-8564-60d612e5405f';
const TENANT   = '3b704bc6-f92b-4581-a329-e1d4afa9987a';
const SCOPES   = 'Files.Read.All Sites.Read.All User.Read';
const DRIVE_ID = 'b!pmFBZLuJVkeuGzPtHmyMtMnI1MPI-WtNtZQeYhwzMrCBd7CMfYuTQKSXTAwlNDU4';
const ITEM_ID  = '01FRDE3KMK5RHCJV4F4FE3JD5SSAWLFEMT';
const REDIRECT = 'https://reporte-ventas-sc.vercel.app/';

let currency = 'usd';
let activeYears = new Set();
let allData = null;
let charts = {};

// --- PKCE ---
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generatePKCE() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: b64url(digest) };
}

function showScreen(id) {
  ['login-screen','loading-screen','error-screen','report-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? (s === 'report-screen' ? 'block' : 'flex') : 'none';
  });
}
function setLoading(msg) { showScreen('loading-screen'); document.getElementById('loading-msg').textContent = msg; }
function setError(msg) { showScreen('error-screen'); document.getElementById('error-msg').textContent = msg; }

async function doLogin() {
  const { verifier, challenge } = await generatePKCE();
  const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);
  const p = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT, scope: SCOPES, state, code_challenge: challenge, code_challenge_method: 'S256' });
  window.location.href = `https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/authorize?${p}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) throw new Error('PKCE verifier no encontrado.');
  const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT, code_verifier: verifier });
  const res = await fetch(`https://login.microsoftonline.com/${TENANT}/oauth2/v2.0/token`, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || `Error ${res.status}`);
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('oauth_state');
  return data.access_token;
}

async function handleCallback() {
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code'), state = p.get('state'), error = p.get('error');
  if (error) { setError(`Error de autenticación: ${p.get('error_description') || error}`); return true; }
  if (!code) return false;
  if (state !== sessionStorage.getItem('oauth_state')) { setError('Error de seguridad: state inválido.'); return true; }
  history.replaceState(null, '', window.location.pathname);
  setLoading('Autenticando...');
  const token = await exchangeCode(code);
  sessionStorage.setItem('ms_token', token);
  await loadFile(token);
  return true;
}

async function getUser(token) {
  const res = await fetch('https://graph.microsoft.com/v1.0/me', { headers: { Authorization: 'Bearer ' + token } });
  return res.ok ? res.json() : null;
}

// --- Data helpers ---
function periodKey(d) {
  if (d instanceof Date) return d.toISOString().slice(0, 7);
  return String(d).slice(0, 7);
}
function periodLabel(k) {
  if (!k) return '';
  const [y, m] = k.split('-');
  return ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m)-1] + '-' + y.slice(2);
}

function aggregateRows(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = periodKey(r['Periodo fiscal']);
    if (!map.has(key)) map.set(key, { raciones: 0, montoNeto: 0, netoUsd: 0 });
    const p = map.get(key);
    p.raciones  += Number(r['Raciones'])    || 0;
    p.montoNeto += Number(r['Monto Neto'])  || 0;
    p.netoUsd   += Number(r['Neto u$s'])    || 0;
  });
  return map;
}

function parseMEP(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const mep = new Map();
  let hdr = -1;
  for (let i = 0; i < rows.length; i++) {
    if (String(rows[i][1]).toLowerCase().includes('periodo')) { hdr = i; break; }
  }
  if (hdr < 0) return mep;
  for (let i = hdr + 1; i < rows.length; i++) {
    const per = rows[i][1], val = rows[i][3];
    if (!per || !val) continue;
    const d = per instanceof Date ? per : new Date(per);
    if (isNaN(d)) continue;
    mep.set(d.toISOString().slice(0, 7), Math.round(Number(val)));
  }
  return mep;
}

async function loadFile(token) {
  setLoading('Descargando archivo desde SharePoint...');
  try {
    const user = await getUser(token);
    if (user) {
      const initials = ((user.givenName?.[0] || '') + (user.surname?.[0] || '')).toUpperCase() || '?';
      document.getElementById('avatar').textContent = initials;
      document.getElementById('avatar').style.display = 'flex';
      document.getElementById('user-name').textContent = user.displayName || user.userPrincipalName;
    }

    const url = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${ITEM_ID}/content`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { showScreen('login-screen'); return; }
    if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);

    setLoading('Procesando datos...');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['Base'], { defval: '' });

    const scRows    = rows.filter(r => String(r['UDN']).trim() === 'Sous Chef');
    const slRows    = rows.filter(r => String(r['UDN']).trim() === 'Social Lunch');

    const scMonthly    = aggregateRows(scRows);
    const slMonthly    = aggregateRows(slRows);
    const totalMonthly = aggregateRows(rows);

    const mepData = wb.Sheets['Indices'] ? parseMEP(wb.Sheets['Indices']) : new Map();

    // Top productos (Tipo final, acumulado total — se filtra por año al renderizar)
    const prodByYear = {};
    scRows.forEach(r => {
      const year = periodKey(r['Periodo fiscal']).slice(0, 4);
      const prod = String(r['Tipo final']).trim() || 'Otros';
      if (!prodByYear[year]) prodByYear[year] = new Map();
      const m = prodByYear[year];
      if (!m.has(prod)) m.set(prod, { raciones: 0, netoUsd: 0 });
      const p = m.get(prod);
      p.raciones += Number(r['Raciones']) || 0;
      p.netoUsd  += Number(r['Neto u$s']) || 0;
    });

    const years = [...new Set([...scMonthly.keys()].map(k => k.slice(0, 4)))].sort();
    activeYears = new Set(years);
    allData = { scMonthly, slMonthly, totalMonthly, mepData, prodByYear, years };

    buildDashboard();
  } catch(e) {
    setError('No se pudo cargar el archivo. ' + e.message);
  }
}

// --- Formatting ---
function fmtN(v, dec = 0) { return Number(v).toLocaleString('es-AR', { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function fmtAR(v) {
  const a = Math.abs(v);
  if (a >= 1e9) return 'AR$ ' + (v/1e9).toFixed(1) + 'B';
  if (a >= 1e6) return 'AR$ ' + (v/1e6).toFixed(1) + 'M';
  return 'AR$ ' + fmtN(v);
}
function fmtUSD(v) {
  const a = Math.abs(v);
  if (a >= 1e6) return 'U$S ' + (v/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return 'U$S ' + fmtN(v/1e3, 1) + 'k';
  return 'U$S ' + fmtN(v);
}
function pctDelta(curr, prev) {
  if (!prev) return '';
  const pct = ((curr - prev) / Math.abs(prev)) * 100;
  const cls = pct >= 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls}">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct).toFixed(1)}%</span>`;
}

// --- Dashboard build ---
function setCurrency(cur) {
  currency = cur;
  document.getElementById('btn-usd').classList.toggle('active', cur === 'usd');
  document.getElementById('btn-ars').classList.toggle('active', cur === 'ars');
  if (allData) renderAll();
}

function buildDashboard() {
  const yf = document.getElementById('year-filters');
  yf.innerHTML = '';
  const addBtn = (label, years) => {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (!years ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeYears = years ? new Set(years) : new Set(allData.years);
      renderAll();
    };
    yf.appendChild(btn);
  };
  addBtn('Todos', null);
  allData.years.forEach(y => addBtn(y, [y]));

  renderMEP();
  renderAll();
  showScreen('report-screen');
}

function renderMEP() {
  const keys = [...allData.mepData.keys()].sort().slice(-6).reverse();
  document.getElementById('mep-bar').innerHTML =
    `<span class="mep-label">TC MEP</span>` +
    keys.map(k => `<span class="mep-item"><span class="mep-month">${periodLabel(k)}</span><span class="mep-val">$${fmtN(allData.mepData.get(k))}</span></span>`).join('');
}

function renderAll() {
  const months = [...allData.scMonthly.keys()].filter(k => activeYears.has(k.slice(0,4))).sort();
  if (!months.length) return;

  const labels   = months.map(periodLabel);
  const scData   = months.map(k => allData.scMonthly.get(k)    || { raciones:0, montoNeto:0, netoUsd:0 });
  const slData   = months.map(k => allData.slMonthly.get(k)    || { raciones:0, montoNeto:0, netoUsd:0 });
  const totData  = months.map(k => allData.totalMonthly.get(k) || { raciones:0, montoNeto:0, netoUsd:0 });

  // KPIs — latest month vs previous
  const lastIdx = months.length - 1;
  const sc   = scData[lastIdx];
  const scP  = scData[lastIdx - 1] || {};
  const tot  = totData[lastIdx];
  const lastLabel = periodLabel(months[lastIdx]).toUpperCase();
  const prevLabel = lastIdx > 0 ? periodLabel(months[lastIdx-1]) : '';

  const factur = currency === 'usd' ? sc.netoUsd   : sc.montoNeto;
  const facturP= currency === 'usd' ? scP.netoUsd  : scP.montoNeto;
  const precio = sc.raciones ? (currency === 'usd' ? sc.netoUsd/sc.raciones : sc.montoNeto/sc.raciones) : 0;
  const precioP= scP.raciones? (currency === 'usd' ? scP.netoUsd/scP.raciones : scP.montoNeto/scP.raciones) : 0;
  const pctUsd = tot.netoUsd   ? sc.netoUsd/tot.netoUsd*100     : 0;
  const pctRac = tot.raciones  ? sc.raciones/tot.raciones*100   : 0;

  const kpiData = [
    {
      label: `Facturación SC ${lastLabel}`,
      main: currency === 'usd' ? `U$S ${fmtN(Math.round(sc.netoUsd))}` : fmtAR(sc.montoNeto),
      sub:  currency === 'usd' ? fmtAR(sc.montoNeto) : `U$S ${fmtN(Math.round(sc.netoUsd))}`,
      delta: pctDelta(factur, facturP),
      hint: prevLabel ? `vs ${prevLabel} (${currency==='usd'?fmtUSD(facturP):fmtAR(facturP)})` : '',
    },
    {
      label: `Raciones SC ${lastLabel}`,
      main: fmtN(Math.round(sc.raciones)),
      sub: '',
      delta: pctDelta(sc.raciones, scP.raciones),
      hint: prevLabel ? `vs ${prevLabel} (${fmtN(Math.round(scP.raciones||0))})` : '',
    },
    {
      label: 'Precio prom. / ración',
      main: currency === 'usd' ? `U$S ${fmtN(precio, 2)}` : `AR$ ${fmtN(Math.round(precio))}`,
      sub:  currency === 'usd' ? `AR$ ${fmtN(Math.round(sc.raciones?sc.montoNeto/sc.raciones:0))}` : `U$S ${fmtN(sc.raciones?sc.netoUsd/sc.raciones:0, 2)}`,
      delta: pctDelta(precio, precioP),
      hint: prevLabel ? `vs ${prevLabel}` : '',
    },
    {
      label: 'SC sobre total grupo',
      main: `${pctUsd.toFixed(1)}%`,
      sub:  `${pctRac.toFixed(1)}% raciones`,
      delta: '', hint: '',
    },
  ];

  document.getElementById('kpi-row').innerHTML = kpiData.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-main">${c.main}</div>
      ${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ''}
      ${c.delta ? `<div class="kpi-delta">${c.delta} <span style="color:var(--text2);font-size:11px">${c.hint}</span></div>` : ''}
    </div>`).join('');

  // Chart 1: Facturación mensual
  document.getElementById('title-facturacion').textContent =
    `Facturación mensual ${currency==='usd'?'U$S':'AR$'} — Sous Chef`;
  const factVals = scData.map(d => Math.round(currency==='usd' ? d.netoUsd : d.montoNeto));
  destroyChart('fact');
  charts.fact = new Chart(document.getElementById('chart-facturacion'), {
    type: 'bar',
    data: { labels, datasets: [{ data: factVals, backgroundColor: 'rgba(29,184,122,0.75)', borderColor: '#1db87a', borderWidth: 1, borderRadius: 3 }] },
    options: darkOpts(v => currency==='usd' ? fmtUSD(v) : fmtAR(v)),
  });

  // Chart 2: SC vs SL
  destroyChart('vssl');
  charts.vssl = new Chart(document.getElementById('chart-vs-sl'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Sous Chef',    data: scData.map(d => Math.round(d.netoUsd)), backgroundColor: 'rgba(29,184,122,0.8)',  borderRadius: 2 },
        { label: 'Social Lunch', data: slData.map(d => Math.round(d.netoUsd)), backgroundColor: 'rgba(59,142,240,0.6)',  borderRadius: 2 },
      ],
    },
    options: { ...darkOpts(v => fmtUSD(v)), plugins: { legend: { display: true, labels: { color: '#8b90a0', font: { size: 11 }, boxWidth: 12 } } } },
  });

  // Chart 3: Top productos (acumulado años activos)
  const prodMap = new Map();
  activeYears.forEach(y => {
    const m = allData.prodByYear[y];
    if (!m) return;
    m.forEach((v, k) => {
      if (!prodMap.has(k)) prodMap.set(k, { raciones: 0, netoUsd: 0 });
      const p = prodMap.get(k);
      p.raciones += v.raciones;
      p.netoUsd  += v.netoUsd;
    });
  });
  const prods = [...prodMap.entries()]
    .map(([name, v]) => ({ name, ...v }))
    .filter(p => p.raciones > 0)
    .sort((a, b) => b.raciones - a.raciones)
    .slice(0, 12);

  destroyChart('prod');
  charts.prod = new Chart(document.getElementById('chart-productos'), {
    type: 'bar',
    data: {
      labels: prods.map(p => p.name),
      datasets: [{ data: prods.map(p => Math.round(p.raciones)), backgroundColor: 'rgba(59,142,240,0.7)', borderRadius: 3 }],
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b90a0', font: { size: 10 }, callback: v => fmtN(v) }, grid: { color: '#2e3240' } },
        y: { ticks: { color: '#e8eaf0', font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

function darkOpts(yFmt) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8b90a0', font: { size: 11 }, autoSkip: true, maxRotation: 45 }, grid: { display: false } },
      y: { ticks: { color: '#8b90a0', font: { size: 11 }, callback: yFmt }, grid: { color: '#2e3240' } },
    },
  };
}

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

(async () => {
  const handled = await handleCallback();
  if (!handled) {
    const stored = sessionStorage.getItem('ms_token');
    if (stored) loadFile(stored); else showScreen('login-screen');
  }
})();
</script>
</body>
</html>
